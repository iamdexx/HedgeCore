[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
evm_version = "cancun"
via_ir = true
optimizer = true
optimizer_runs = 200

remappings = [
    "forge-std/=lib/forge-std/src/",
    "solady/=lib/solady/src/",
]

[profile.default.fuzz]
runs = 512

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
